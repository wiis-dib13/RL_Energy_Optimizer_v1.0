<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java - RL Simulation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
    <style>
        /* --- LE LOOK JAVA SWING --- */
        body {
            background-color: #555; /* Fond sombre derrière la fenêtre */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Tahoma, Dialog, Arial, sans-serif;
            font-size: 12px;
        }

        /* La fausse fenêtre (JFrame) */
        .jframe {
            background-color: #f0f0f0; /* Le gris Swing classique */
            width: 900px;
            height: 600px;
            border: 2px outset #ffffff;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* Fausse barre de titre Windows/Java */
        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 3px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .title-bar-controls button {
            background-color: #c0c0c0;
            border: 2px outset #ffffff;
            width: 16px;
            height: 16px;
            font-size: 10px;
            line-height: 10px;
            padding: 0;
            cursor: pointer;
            margin-left: 2px;
        }
        .title-bar-controls button:active { border: 2px inset #ffffff; }

        /* Contenu principal (BorderLayout) */
        .content-pane {
            display: flex;
            padding: 10px;
            gap: 10px;
            height: calc(100% - 25px);
            box-sizing: border-box;
        }

        /* Panneau de gauche (JPanel) */
        .left-panel {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Panneau central */
        .center-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Faux TitledBorder Swing */
        fieldset {
            border: 1px solid #a0a0a0;
            padding: 10px;
            margin: 0;
            background-color: #f0f0f0;
        }
        legend {
            color: #0000ee; /* Bleu classique des titres Swing */
            padding: 0 5px;
        }

        /* Contrôles (JTextField, JLabel, JButton) */
        label { margin-bottom: 2px; display: block; }
        
        input[type="number"] {
            width: 100%;
            padding: 3px;
            border: 2px inset #ffffff;
            background-color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button.swing-btn {
            background-color: #e0e0e0;
            border: 2px outset #ffffff;
            padding: 5px 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button.swing-btn:active {
            border: 2px inset #ffffff;
            padding: 6px 9px 4px 11px; /* Effet d'enfoncement */
        }
        button.swing-btn[disabled] {
            color: #888;
            border: 2px outset #ffffff;
        }

        /* Zone d'affichage des stats */
        .stats-grid {
            display: flex;
            gap: 10px;
        }
        .stat-box {
            flex: 1;
            background-color: white;
            border: 2px inset #ffffff;
            padding: 10px;
            text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 5px; }

        /* Conteneur Chart */
        .chart-container {
            flex-grow: 1;
            background-color: white;
            border: 2px inset #ffffff;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="jframe">
        <div class="title-bar">
            <span>☕ RLSimulationApp</span>
            <div class="title-bar-controls">
                <button>_</button><button>□</button><button>X</button>
            </div>
        </div>

        <div class="content-pane">
            
            <div class="left-panel">
                <fieldset>
                    <legend>Configuration</legend>
                    
                    <label>Nombre de Caméras :</label>
                    <input type="number" id="cameras" value="16">

                    <label>Nombre d'Épisodes :</label>
                    <input type="number" id="epochs" value="200">

                    <button id="startBtn" class="swing-btn" onclick="startSimulation()">Démarrer</button>
                </fieldset>

                <fieldset>
                    <legend>Console</legend>
                    <div id="statusText" style="color: #666; font-family: monospace;">En attente...</div>
                </fieldset>
            </div>

            <div class="center-panel">
                <fieldset>
                    <legend>Métriques en temps réel</legend>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div>Épisode</div>
                            <div class="stat-value" id="currentEpoch">0 / 0</div>
                        </div>
                        <div class="stat-box">
                            <div>Énergie (kJ)</div>
                            <div class="stat-value" id="energyValue">0.0</div>
                        </div>
                        <div class="stat-box">
                            <div>Meilleure Action</div>
                            <div class="stat-value" id="rewardValue" style="color: green;">—</div>
                        </div>
                    </div>
                </fieldset>

                <fieldset style="flex-grow: 1; display: flex; flex-direction: column;">
                    <legend>JFreeChart Panel</legend>
                    <div class="chart-container">
                        <canvas id="energyChart"></canvas>
                    </div>
                </fieldset>
            </div>
        </div>
    </div>

    <script>
        // ==========================================================
        //  AGENT Q-LEARNING RÉEL — porté de ModulePlacementMapping.java
        // ==========================================================

        // Hyperparamètres (identiques au code Java)
        const ALPHA = 0.15;
        const GAMMA = 0.90;
        const EPSILON_START = 1.0;
        const EPSILON_MIN = 0.05;
        const EPSILON_DECAY = 0.99;
        const UCB_C = 2.0;

        const W_ENERGY  = 0.85;
        const W_LOAD    = 0.10;
        const W_LATENCY = 0.05;

        const N_ACTIONS = 4;
        const ACTION_NAMES  = ["EDGE", "PROXY", "CAMERA", "CLOUD"];
        const ACTION_COLORS = ["#008000", "#0000ee", "#ff8c00", "#c00000"];

        // Valeurs réelles mesurées (Joules) — affichage before and after.txt
        const CLOUD_ENERGY  = 3233631;
        const EDGE_ENERGY   = 166866;
        const CAMERA_ENERGY = 169221;

        function estimatedEnergy(action, numCameras) {
            switch (action) {
                case 0: return EDGE_ENERGY;                         // EDGE (fog routers)
                case 1: return EDGE_ENERGY * 1.2;                   // PROXY
                case 2: return CAMERA_ENERGY * (numCameras / 4);    // CAMERA (scale)
                case 3: return CLOUD_ENERGY;                        // CLOUD
            }
        }
        function overloadScore(a) { return [0.10, 0.40, 0.80, 0.05][a]; }
        function latencyScore(a)  { return [0.15, 0.35, 0.05, 0.70][a]; }

        function rewardFor(action, numCameras) {
            const normEnergy  = estimatedEnergy(action, numCameras) / CLOUD_ENERGY;
            const normLoad    = overloadScore(action);
            const normLatency = latencyScore(action);
            const penalty     = W_ENERGY * normEnergy + W_LOAD * normLoad + W_LATENCY * normLatency;
            const actionBonus = action === 0 ? 0.3 : action === 3 ? -0.5 : 0;
            return -penalty + actionBonus;
        }

        class RLAgent {
            constructor(numCameras) {
                this.numCameras = numCameras;
                this.Q = new Array(N_ACTIONS).fill(0);
                this.visits = new Array(N_ACTIONS).fill(0);
                this.totalVisits = 0;
                this.epsilon = EPSILON_START;
                for (let a = 0; a < N_ACTIONS; a++) this.Q[a] = rewardFor(a, numCameras);
            }
            greedy() {
                let best = 0;
                for (let i = 1; i < N_ACTIONS; i++) if (this.Q[i] > this.Q[best]) best = i;
                return best;
            }
            ucbSelect() {
                let best = 0, bestValue = -Infinity;
                for (let a = 0; a < N_ACTIONS; a++) {
                    const bonus = this.visits[a] === 0
                        ? Number.MAX_VALUE
                        : UCB_C * Math.sqrt(Math.log(this.totalVisits + 1) / this.visits[a]);
                    const v = this.Q[a] + bonus;
                    if (v > bestValue) { bestValue = v; best = a; }
                }
                return best;
            }
            selectAction() {
                return Math.random() < this.epsilon ? this.ucbSelect() : this.greedy();
            }
            update(action, reward) {
                const maxNext = this.Q[this.greedy()];
                const alpha = ALPHA / (1 + 0.02 * this.visits[action]);
                this.Q[action] += alpha * (reward + GAMMA * maxNext - this.Q[action]);
                this.visits[action]++;
                this.totalVisits++;
                this.epsilon = Math.max(EPSILON_MIN, this.epsilon * EPSILON_DECAY);
            }
        }

        // ==========================================================
        //  GRAPHIQUE — 4 courbes (une par action) style JFreeChart
        // ==========================================================
        document.addEventListener('DOMContentLoaded', function () {
            const ctx = document.getElementById('energyChart').getContext('2d');
            window.energyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: ACTION_NAMES.map((name, i) => ({
                        label: name,
                        data: [],
                        borderColor: ACTION_COLORS[i],
                        backgroundColor: 'transparent',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        y: { title: { display: true, text: 'Q-value', font: { family: 'Tahoma', size: 11 } },
                             grid: { color: '#e0e0e0' },
                             ticks: { color: '#000', font: { family: 'Tahoma', size: 10 } } },
                        x: { title: { display: true, text: 'Épisode', font: { family: 'Tahoma', size: 11 } },
                             grid: { color: '#e0e0e0' },
                             ticks: { color: '#000', font: { family: 'Tahoma', size: 10 } } }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: { font: { family: 'Tahoma', size: 11 } }
                        }
                    }
                }
            });
        });

        let simulationInterval;

        function startSimulation() {
            const numCameras  = parseInt(document.getElementById('cameras').value);
            const totalEpochs = parseInt(document.getElementById('epochs').value);
            const btn    = document.getElementById('startBtn');
            const status = document.getElementById('statusText');

            btn.disabled = true;
            status.innerHTML = "[RL] Démarrage — CLOUD=" + (CLOUD_ENERGY/1000).toFixed(0)
                             + "kJ vs EDGE=" + (EDGE_ENERGY/1000).toFixed(0) + "kJ";
            status.style.color = "blue";

            // Reset chart
            window.energyChart.data.labels = [];
            window.energyChart.data.datasets.forEach(ds => ds.data = []);

            const agent = new RLAgent(numCameras);
            let currentEpoch = 0;

            clearInterval(simulationInterval);

            simulationInterval = setInterval(() => {
                currentEpoch++;

                // Un épisode = sélection + récompense + mise à jour Q
                const action = agent.selectAction();
                const reward = rewardFor(action, numCameras);
                agent.update(action, reward);

                const best = agent.greedy();
                const bestEnergyKJ = estimatedEnergy(best, numCameras) / 1000;

                document.getElementById('currentEpoch').innerText = `${currentEpoch} / ${totalEpochs}`;
                document.getElementById('energyValue').innerText  = bestEnergyKJ.toFixed(1);
                const rv = document.getElementById('rewardValue');
                rv.innerText   = ACTION_NAMES[best];
                rv.style.color = ACTION_COLORS[best];

                // Mettre à jour les 4 courbes Q-values
                window.energyChart.data.labels.push(currentEpoch);
                for (let a = 0; a < N_ACTIONS; a++) {
                    window.energyChart.data.datasets[a].data.push(agent.Q[a]);
                }
                window.energyChart.update();

                if (currentEpoch >= totalEpochs) {
                    clearInterval(simulationInterval);
                    btn.disabled = false;

                    const savings = (1 - estimatedEnergy(best, numCameras) / CLOUD_ENERGY) * 100;
                    status.innerHTML =
                        "[RL] Terminé ✓<br>" +
                        "Choisi : <b>" + ACTION_NAMES[best] + "</b><br>" +
                        "Énergie : " + bestEnergyKJ.toFixed(1) + " kJ<br>" +
                        "Gain : " + savings.toFixed(1) + "% vs CLOUD<br>" +
                        "ε final : " + agent.epsilon.toFixed(3);
                    status.style.color = "black";
                }
            }, 50);
        }
    </script>
</body>
</html>
